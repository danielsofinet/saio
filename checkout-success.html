<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saio — You're all set!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Calistoga&family=Stack+Sans+Text:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Stack Sans Text', sans-serif;
            background-color: #2A2827;
            color: #F3F1EF;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .container {
            max-width: 420px;
        }
        h1 {
            font-family: 'Calistoga', serif;
            font-size: 2rem;
            margin-bottom: 16px;
            color: #F7B98A;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.85;
        }
        .success-img {
            width: 50%;
            margin: 0 auto;
        }
        .success-img img {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-img">
                        <img src="img/success.png" />
                    </div>
        <h1>You're all set!</h1>
        <p>Your Saio Pro subscription is now active. You can close this tab and return to the app.</p>
    </div>
</body>
</html>
